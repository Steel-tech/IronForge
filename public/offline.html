<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — IronForge</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #0a0a0f;
        color: #e0e0f0;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 480px;
        text-align: center;
        border: 1px solid #2a2a40;
        background: #12121c;
        padding: 2.5rem 2rem;
        border-radius: 12px;
        box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
        color: #00f0ff;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        letter-spacing: 0.1em;
      }
      p {
        margin: 0.5rem 0;
        color: #a0a0b8;
        font-size: 0.875rem;
        line-height: 1.6;
      }
      .tag {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        color: #6a6a80;
        letter-spacing: 0.2em;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: transparent;
        color: #00f0ff;
        border: 1px solid #00f0ff;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: rgba(0, 240, 255, 0.1);
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>OFFLINE</h1>
      <p>Connection to the grid lost.</p>
      <p>You can still view pages you've already visited. Reconnect to load new content.</p>
      <button onclick="location.reload()">RETRY</button>
      <div class="tag">[ IRONFORGE · SERVICE WORKER ACTIVE ]</div>
    </div>
  </body>
</html>
